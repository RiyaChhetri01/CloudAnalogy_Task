<template>

    <template if:true={isLoading}>
        <div class="slds-align_absolute-center slds-p-around_large">
            <lightning-spinner alternative-text="Loading Case..." size="medium"></lightning-spinner>
        </div>
    </template>

  
    <template if:false={isLoading}>

        <lightning-card title="Case Details">

            <div class="slds-p-around_medium">

                <template if:true={caseRecord}>

                    <div class="slds-grid slds-wrap slds-gutters">

                        <div class="slds-col slds-size_1-of-1 slds-m-bottom_small">
                            <p><strong>Case Number:</strong> {caseRecord.CaseNumber}</p>
                        </div>

                        <div class="slds-col slds-size_1-of-1 slds-m-bottom_small">
                            <p><strong>Subject:</strong> {caseRecord.Subject}</p>
                        </div>

                        <div class="slds-col slds-size_1-of-1 slds-m-bottom_small">
                            <p><strong>Status:</strong> {caseRecord.Status}</p>
                        </div>

                        <div class="slds-col slds-size_1-of-1 slds-m-bottom_small">
                            <p><strong>Created Date:</strong>
                                <lightning-formatted-date-time value={caseRecord.CreatedDate}>
                                </lightning-formatted-date-time>
                            </p>
                        </div>

                        <div class="slds-col slds-size_1-of-1 slds-m-bottom_small">
                            <p><strong>Description:</strong></p>
                            <p>{caseRecord.Description}</p>
                        </div>

                    </div>

                    <div class="slds-text-align_center slds-m-top_medium">
                        <lightning-button 
                            label="Back" 
                            variant="neutral"
                            onclick={goBack}>
                        </lightning-button>
                    </div>

                </template>

             
                <template if:false={caseRecord}>
                    <p class="slds-text-align_center slds-text-color_weak">
                        No Case Found
                    </p>
                </template>

            </div>

        </lightning-card>

    </template>

</template>
