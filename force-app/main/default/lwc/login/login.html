<template>
    <div class="login-container slds-card slds-p-around_large">
        <h2 class="slds-text-heading_medium slds-m-bottom_medium">Portal Login</h2>
        
        <lightning-input 
            label="Username" 
            data-id="username" 
        
            onchange={handleInputChange}
            class="slds-m-bottom_small">
        </lightning-input>

        <lightning-input 
            label="Password" 
            type="password" 
            data-id="password" 
            onchange={handleInputChange}
            class="slds-m-bottom_small">
        </lightning-input>

        <template if:true={errorMessage}>
            <div class="slds-text-color_error slds-m-bottom_small">
                {errorMessage}
            </div>
        </template>

        <div class="slds-align_absolute-center">
            <lightning-button 
                label="Sign In" 
                variant="brand" 
                onclick={handleLogin}
                stretch>
            </lightning-button>
        </div>
         <lightning-button 
                label="Forgot Password?"
                 variant="base"
                onclick={handleForgotPassword}>
        </lightning-button>
    </div>
    <div class="slds-text-align_center slds-m-top_medium">
    <span>Don't have an account? </span>
    
    <a href="javascript:void(0);" onclick={goToRegister} class="register-link">
        Register here
    </a>
</div>
</template>
