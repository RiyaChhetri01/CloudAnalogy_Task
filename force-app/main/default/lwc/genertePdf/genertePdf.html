<template>
    <lightning-card title="PDF Generator" icon-name="standard:pdf_ext">
        <div class="slds-p-around_medium">
            <lightning-button label="Preview And Download PDF" variant="brand" onclick={openModal}> </lightning-button>
        </div>
    </lightning-card>
   <template lwc:if={isModalOpen}>
        <section  role="dialog"  tabindex="-1"  class="slds-modal slds-fade-in-open slds-modal_large">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <h2 class="slds-text-heading_medium">  {accData.Name}_Report.pdf </h2>
                </header>
                <div class="slds-modal__content viewer-bg">
                    <div class="main-preview-area">
                        <div class="a4-paper">
                            <c-create-data-of-pdf-generator account-data={accData} contact-data={contacts} opportunity-data={opps}> </c-create-data-of-pdf-generator>
                        </div>
                    </div>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button  label="Close" onclick={closeModal} class="slds-m-right_x-small"> </lightning-button>
                    <lightning-button label="Download PDF" variant="brand"  onclick={generatePDF}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
