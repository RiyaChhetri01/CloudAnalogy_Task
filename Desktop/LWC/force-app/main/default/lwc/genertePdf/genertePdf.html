<template>
    <lightning-card title="PDF Generator" icon-name="standard:pdf_ext">
        <div class="slds-p-around_medium">
            <lightning-button 
                label="Preview & Download PDF"  variant="brand"  onclick={openModal}>
            </lightning-button>
        </div>
    </lightning-card>

    <template lwc:if={isModalOpen}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <h2 class="slds-text-heading_medium">Document Preview</h2>
                </header>

                <div class="slds-modal__content slds-p-around_medium">
                    <c-create-data-of-pdf-generator 
                        account-data={accData} 
                        contact-data={contacts} 
                        opportunity-data={opps}>
                    </c-create-data-of-pdf-generator>
                </div>

                <footer class="slds-modal__footer">
                    <button class="slds-button slds-button_neutral" onclick={closeModal}>Cancel</button>
                    <button class="slds-button slds-button_brand" onclick={generatePDF}>Download PDF</button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
